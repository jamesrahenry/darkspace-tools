---
# bootstrap-system.yml
# Base system hardening and prerequisites
# Run first on any new host before deploying profiles

- name: Bootstrap and Harden System
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - ufw
          - fail2ban
          - unattended-upgrades
          - apt-listchanges
          - git
          - python3
          - python3-pip
          - iproute2
          - iptables-persistent
          - netfilter-persistent
          - tcpdump
          - curl
          - wget
          - htop
          - vim
          - ntp
        state: present

    - name: Load GRE kernel module
      modprobe:
        name: ip_gre
        state: present

    - name: Make GRE module persistent
      lineinfile:
        path: /etc/modules
        line: ip_gre
        create: yes

    - name: Configure UFW defaults
      ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Allow SSH through UFW
      ufw:
        rule: allow
        port: '22'
        proto: tcp
        comment: 'SSH access'

    - name: Configure fail2ban
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5

          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
        mode: '0644'

    - name: Start and enable fail2ban
      systemd:
        name: fail2ban
        state: started
        enabled: yes

    - name: Configure automatic security updates
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        mode: '0644'

    - name: Set timezone to UTC
      timezone:
        name: UTC

    - name: Configure kernel parameters for networking
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { name: 'net.ipv4.ip_forward', value: '1' }
        - { name: 'net.ipv4.tcp_syncookies', value: '1' }
        - { name: 'net.ipv4.conf.default.accept_redirects', value: '0' }
        - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
        - { name: 'net.ipv4.conf.default.send_redirects', value: '0' }
        - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }

    - name: Display bootstrap complete
      debug:
        msg:
          - "System bootstrap complete!"
          - "UFW: Enabled (SSH allowed)"
          - "fail2ban: Running"
          - "GRE module: Loaded"
          - "IP forwarding: Enabled"
          - "Auto-updates: Configured"
